<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tellez Squad Web</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;800&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            Tellez Squad
        </div>

        <a href="index.html">Главная</a>
        <a href="help.html">Help FamWar</a>
        <a href="bank.html">TellezBank</a>
        <a href="admin.html">Админ Панель</a>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <button class="menu-toggle" id="menuToggle">
        ☰
    </button>

    <button class="notification-btn">
        🔔
        <span class="notification-badge" id="notifCount">0</span>
    </button>

    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow--green"></div>
    <div class="bg-glow bg-glow--purple"></div>
    <div class="noise"></div>

    <main class="layout">

        <header class="hero">

            <div class="emblem">

                <svg viewBox="0 0 80 80" fill="none">

                    <polygon points="40,6 72,22 72,58 40,74 8,58 8,22"
                        stroke="#4e8a63"
                        stroke-width="1.2"
                        fill="none"
                        opacity="0.55"/>

                    <polygon points="40,16 62,28 62,52 40,64 18,52 18,28"
                        stroke="#7a5ca3"
                        stroke-width="0.8"
                        fill="none"
                        opacity="0.4"/>

                    <circle cx="40" cy="40" r="5"
                        fill="#4e8a63"
                        opacity="0.75"/>

                </svg>

            </div>

            <h1 class="title">
                <span class="title-main">Tellez Squad</span>
                <span class="title-accent">Web</span>
            </h1>

            <p class="subtitle">
                связь с высшими званиями в отряде
            </p>

        </header>

        <nav class="cards">

            <a href="help.html" class="card card--green">

                <div class="card__decor">

                    <svg viewBox="0 0 48 48" fill="none">

                        <path
                            d="M24 8 L38 15 L38 33 L24 40 L10 33 L10 15 Z"
                            stroke="currentColor"
                            stroke-width="1.2"
                            fill="none"
                            opacity="0.5"/>

                        <path
                            d="M18 24 L21 27 L30 18"
                            stroke="currentColor"
                            stroke-width="2.2"
                            stroke-linecap="round"
                            stroke-linejoin="round"/>

                    </svg>

                </div>

                <div class="card__body">
                    <span class="card__title">
                        Help FamWar
                    </span>

                    <span class="card__sub">
                        помощь на FamWar
                    </span>
                </div>

                <span class="card__arrow">
                    →
                </span>

                <div class="card__shine"></div>

            </a>

            <a href="bank.html" class="card card--purple">

                <div class="card__decor">

                    <svg viewBox="0 0 48 48" fill="none">

                        <rect
                            x="11"
                            y="20"
                            width="26"
                            height="17"
                            rx="3"
                            stroke="currentColor"
                            stroke-width="1.2"
                            fill="none"
                            opacity="0.5"/>

                    </svg>

                </div>

                <div class="card__body">

                    <span class="card__title">
                        TellezBank
                    </span>

                    <span class="card__sub">
                        банковские операции
                    </span>

                </div>

                <span class="card__arrow">
                    →
                </span>

                <div class="card__shine"></div>

            </a>

        </nav>

    </main>

    <footer class="footer">

        <span class="footer__line"></span>

        <p class="footer__text">
            Банк не является настоящим. Все операции внутриигровые в Grand Mobile
        </p>

    </footer>

    <script>
        const menuToggle = document.getElementById("menuToggle");
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("sidebarOverlay");

        menuToggle.addEventListener("click", () => {
            sidebar.classList.toggle("sidebar-open");
            overlay.classList.toggle("sidebar-overlay-open");
        });

        overlay.addEventListener("click", () => {
            sidebar.classList.remove("sidebar-open");
            overlay.classList.remove("sidebar-overlay-open");
        });
    </script>

    <script type="module" src="app.js"></script>

</body>
  </html>
